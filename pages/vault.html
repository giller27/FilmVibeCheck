<div class="vault-header">
    <h1>Бібліотека фільмів</h1>
    <p class="subtitle">Повна база контенту VibeCheck</p>
</div>

<div class="vault-container">
    <div class="vault-filters">
        <button class="vault-btn active" data-filter="all">Всі фільми</button>
        <button class="vault-btn" data-filter="drama">Драма</button>
        <button class="vault-btn" data-filter="action">Екшн</button>
        <button class="vault-btn" data-filter="comedy">Комедія</button>
        <button class="vault-btn" data-filter="scifi">Sci-Fi</button>
        <button class="vault-btn" data-filter="fantasy">Фентезі</button>
    </div>

    <div class="vault-collections">
        <div class="collection">
            <h3>За жанрами</h3>
            <div class="movies-grid" id="vaultMovies"></div>
        </div>

        <div class="collection">
            <h3>Тематичні підбірки</h3>
            <div class="thematic-collections" id="thematicCollections"></div>
        </div>
    </div>
</div>
