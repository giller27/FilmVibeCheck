<div class="profile-header">
    <h1>Мій профіль</h1>
    <p class="subtitle">Твоя кіномана статистика</p>
</div>

<div class="profile-container">
    <div class="profile-stats">
        <div class="stat-card">
            <span class="stat-number" id="watchedCount">0</span>
            <span class="stat-label">Переглянуто</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="wishlistCount">0</span>
            <span class="stat-label">Хочу подивитися</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="avgRating">0.0</span>
            <span class="stat-label">Середня оцінка</span>
        </div>
    </div>

    <div class="profile-sections">
        <div class="profile-section">
            <h2>Переглянуто</h2>
            <div class="movies-grid" id="watchedMovies"></div>
        </div>

        <div class="profile-section">
            <h2>Хочу подивитися</h2>
            <div class="movies-grid" id="wishlistMovies"></div>
        </div>

        <div class="profile-section">
            <h2>Твої улюблені параметри</h2>
            <div id="preferences"></div>
        </div>
    </div>
</div>
